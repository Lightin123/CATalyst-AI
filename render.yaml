# ──────────────────────────────────────────────────────────────
# CATalyst AI — Render Blueprint
# Deploy all 3 services from a single repo.
# Docs: https://docs.render.com/blueprint-spec
# ──────────────────────────────────────────────────────────────

services:
  # ── 1. React Frontend (Static Site) ────────────────────────
  - type: web
    name: catalyst-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false  # Set this to your Express backend Render URL

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── 2. Express Backend (Node.js API Gateway) ──────────────
  - type: web
    name: catalyst-ai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_BACKEND_URL
        sync: false  # Set this to your FastAPI Render URL
      - key: FRONTEND_URL
        sync: false  # Set this to your frontend Render URL
      - key: NODE_ENV
        value: production

  # ── 3. FastAPI Backend (Python AI Engine) ──────────────────
  - type: web
    name: catalyst-ai-python
    runtime: python
    rootDir: backend-py
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VECTOR_DB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EXPRESS_BACKEND_URL
        sync: false  # Set this to your Express backend Render URL
      - key: FRONTEND_URL
        sync: false  # Set this to your frontend Render URL
      - key: PYTHON_VERSION
        value: 3.11.9
